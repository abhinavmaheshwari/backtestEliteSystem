<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #ffffff;
    --surface:  #f8f9fa;
    --card:     #ffffff;
    --border:   #e5e7eb;
    --border2:  #d1d5db;
    --accent:   #16a34a;
    --accent-bg:#f0fdf4;
    --accent2:  #2563eb;
    --warn:     #dc2626;
    --warn-bg:  #fef2f2;
    --amber:    #d97706;
    --amber-bg: #fffbeb;
    --text:     #111827;
    --muted:    #6b7280;
    --muted2:   #9ca3af;
    --win:      #16a34a;
    --loss:     #dc2626;
    --open:     #2563eb;
    --neutral:  #6b7280;
    --font-mono:'JetBrains Mono','Fira Code','Consolas',monospace;
    --font-body:'Inter',system-ui,sans-serif;
    --radius:   8px;
    --shadow:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px; min-height:100vh; }

  /* HEADER */
  .header {
    background:#fff; border-bottom:1px solid var(--border);
    padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
  }
  .header h1 { font-size:17px; font-weight:700; color:var(--text); }
  .header h1 span { color:var(--accent); }
  .header-sub { font-size:11px; color:var(--muted); margin-top:2px; font-family:var(--font-mono); }
  .header-right { display:flex; align-items:center; gap:12px; }
  .header-stats { font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .refresh-btn {
    background:#fff; border:1px solid var(--border2); color:var(--text);
    padding:7px 14px; border-radius:var(--radius); cursor:pointer; font-size:12px;
    transition:all .15s;
  }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* LAYOUT */
  .container { max-width:1340px; margin:0 auto; padding:24px 20px; }

  /* KPI ROW */
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:24px; }
  .kpi {
    background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; cursor:pointer; transition:all .15s; position:relative;
  }
  .kpi:hover { border-color:var(--accent); box-shadow:var(--shadow); }
  .kpi.active { border-color:var(--accent); background:var(--accent-bg); box-shadow:0 0 0 3px rgba(22,163,74,.1); }
  .kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; font-weight:600; margin-bottom:6px; }
  .kpi-value { font-size:22px; font-weight:700; font-family:var(--font-mono); color:var(--text); line-height:1; }
  .kpi-value.green { color:var(--win); }
  .kpi-value.red   { color:var(--loss); }
  .kpi-value.blue  { color:var(--open); }
  .kpi-value.amber { color:var(--amber); }
  .kpi-sub { font-size:10px; color:var(--muted2); margin-top:4px; }
  .kpi-hint { font-size:9px; color:var(--accent); margin-top:4px; display:none; }
  .kpi.active .kpi-hint { display:block; }
  .kpi-arrow { position:absolute; bottom:-11px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-top:10px solid var(--accent); display:none; z-index:5; }
  .kpi.active .kpi-arrow { display:block; }

  /* DRILL PANEL */
  #drill-panel {
    background:var(--accent-bg); border:1px solid var(--accent); border-radius:var(--radius);
    margin-bottom:20px; overflow:hidden;
    transition:max-height .3s ease, opacity .2s ease;
    max-height:0; opacity:0;
  }
  #drill-panel.open { max-height:600px; opacity:1; }
  .drill-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:1px solid rgba(22,163,74,.2);
  }
  .drill-title { font-size:13px; font-weight:600; color:var(--accent); }
  .drill-close {
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px;
    line-height:1; padding:0 4px;
  }
  .drill-close:hover { color:var(--text); }
  .drill-body { padding:0; max-height:480px; overflow-y:auto; }

  /* SECTION LABEL */
  .section-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* GRID */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px; }
  @media(max-width:900px) { .grid2,.grid3 { grid-template-columns:1fr; } }

  /* CARD */
  .card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
  .card-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }

  /* CHART */
  .chart-wrap { position:relative; height:210px; }

  /* TABLE */
  .tbl-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th {
    background:var(--surface); color:var(--muted); font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:.6px; padding:9px 10px; text-align:left;
    border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none;
  }
  thead th:hover { color:var(--accent); }
  thead th.sort-asc::after  { content:' ▲'; color:var(--accent); font-size:8px; }
  thead th.sort-desc::after { content:' ▼'; color:var(--accent); font-size:8px; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
  tbody tr:hover { background:var(--surface); }
  tbody td { padding:9px 10px; white-space:nowrap; font-family:var(--font-mono); font-size:12px; }

  /* BADGES */
  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.4px; }
  .badge-win     { background:#dcfce7; color:#15803d; }
  .badge-loss    { background:#fee2e2; color:#b91c1c; }
  .badge-open    { background:#dbeafe; color:#1d4ed8; }
  .badge-neutral { background:#f3f4f6; color:#4b5563; }
  .badge-scanner { background:#fef9c3; color:#854d0e; font-family:var(--font-mono); }

  .pos  { color:var(--win); }
  .neg  { color:var(--loss); }
  .flat { color:var(--muted); }

  /* PNL BAR */
  .pnl-wrap { display:flex; align-items:center; gap:8px; }
  .pnl-bar-track { width:60px; height:4px; background:#e5e7eb; border-radius:2px; overflow:hidden; flex-shrink:0; }
  .pnl-bar-fill  { height:100%; border-radius:2px; }
  .pnl-text      { font-family:var(--font-mono); font-size:12px; font-weight:700; min-width:54px; }

  /* EXPAND DETAIL ROW */
  tbody tr.main-row { cursor:pointer; }
  tbody tr.main-row td:first-child { color:var(--muted2); font-size:10px; width:20px; text-align:center; }
  tbody tr.main-row.open td:first-child { color:var(--accent); }
  tbody tr.main-row.open { background:var(--accent-bg) !important; }
  tbody tr.detail-row td { padding:0; background:var(--accent-bg); border-bottom:2px solid rgba(22,163,74,.2); }
  .detail-panel { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:0; overflow:hidden; transition:max-height .2s ease; }
  .detail-panel.open   { max-height:160px; }
  .detail-panel.closed { max-height:0; }
  .detail-item { padding:10px 14px; border-right:1px solid rgba(22,163,74,.15); }
  .detail-item:last-child { border-right:none; }
  .detail-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:3px; }
  .detail-val   { font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--text); }
  .detail-signals { padding:8px 14px; grid-column:1/-1; border-top:1px solid rgba(22,163,74,.12); font-family:var(--font-mono); font-size:11px; color:var(--amber); }

  /* FILTER BAR */
  .filter-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  .filter-bar select, .filter-bar input {
    background:#fff; border:1px solid var(--border2); color:var(--text);
    padding:6px 10px; border-radius:var(--radius); font-size:12px; font-family:var(--font-mono); outline:none;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color:var(--accent); }

  /* SCANNER BARS */
  .scanner-stat { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .scanner-stat:last-child { border-bottom:none; }
  .scanner-name { width:80px; font-family:var(--font-mono); font-size:11px; color:var(--amber); font-weight:700; }
  .scanner-bar-wrap { flex:1; background:var(--border); border-radius:3px; height:5px; }
  .scanner-bar { height:5px; border-radius:3px; background:var(--accent); }
  .scanner-nums { font-family:var(--font-mono); font-size:11px; color:var(--muted); text-align:right; min-width:100px; }

  /* LOADING */
  #loading { display:flex; align-items:center; justify-content:center; height:60vh; flex-direction:column; gap:16px; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #main { display:none; }

  /* DRILL TABLE uses same table styles */
  .drill-body table thead th { background:rgba(22,163,74,.06); }
  .drill-body table tbody tr:hover { background:rgba(22,163,74,.04); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-family:var(--font-mono);font-size:13px;">Loading performance data…</div>
</div>

<div id="main">
  <div class="header">
    <div>
      <h1>Scanner <span>Performance</span></h1>
      <div class="header-sub" id="gen-time">—</div>
    </div>
    <div class="header-right">
      <span class="header-stats" id="header-stats"></span>
      <button class="refresh-btn" onclick="location.reload()">↺ Refresh</button>
    </div>
  </div>

  <div class="container">

    <!-- KPIs — click any to drill down -->
    <div class="kpi-row" id="kpis"></div>

    <!-- DRILL PANEL -->
    <div id="drill-panel">
      <div class="drill-header">
        <span class="drill-title" id="drill-title">Trades</span>
        <button class="drill-close" onclick="closeDrill()">✕</button>
      </div>
      <div class="drill-body" id="drill-body"></div>
    </div>

    <!-- TRADES -->
    <div class="section-label">All trades</div>
    <div class="card" style="margin-bottom:20px">
      <div class="filter-bar">
        <select id="filterScanner"><option value="">All scanners</option></select>
        <select id="filterStatus">
          <option value="">All status</option>
          <option value="WIN">Win</option>
          <option value="LOSS">Loss</option>
          <option value="OPEN">Open</option>
          <option value="NEUTRAL">Neutral</option>
        </select>
        <select id="filterCategory"><option value="">All categories</option></select>
        <input id="filterSymbol" type="text" placeholder="Search symbol…" style="width:130px">
        <span id="tradeCount" style="margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--muted)"></span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:20px"></th>
              <th data-col="symbol">Symbol</th>
              <th data-col="entry_date">Date</th>
              <th data-col="scanner">Scanner</th>
              <th data-col="category">Category</th>
              <th data-col="entry_price">Entry ₹</th>
              <th data-col="current_price">Current ₹</th>
              <th data-col="pnl_pct" class="sort-desc">P&L %</th>
              <th data-col="days_held">Days</th>
              <th data-col="status">Status</th>
            </tr>
          </thead>
          <tbody id="tradeBody"></tbody>
        </table>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="section-label">Analytics</div>
    <div class="grid2">
      <div class="card"><div class="card-title">Equity curve — avg return per trade</div><div class="chart-wrap"><canvas id="equityChart"></canvas></div></div>
      <div class="card"><div class="card-title">Monthly win rate</div><div class="chart-wrap"><canvas id="monthlyChart"></canvas></div></div>
    </div>
    <div class="grid3">
      <div class="card"><div class="card-title">By scanner</div><div id="scannerStats"></div></div>
      <div class="card"><div class="card-title">By category</div><div class="chart-wrap"><canvas id="categoryChart"></canvas></div></div>
      <div class="card"><div class="card-title">Return distribution</div><div class="chart-wrap"><canvas id="distChart"></canvas></div></div>
    </div>

  </div>
</div>

<script>
const C = { accent:'#16a34a', accent2:'#2563eb', warn:'#dc2626', amber:'#d97706', muted:'#9ca3af', border:'#e5e7eb', text:'#111827', surface:'#f8f9fa' };

Chart.defaults.color       = C.muted;
Chart.defaults.borderColor = C.border;
Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
Chart.defaults.font.size   = 11;

const pct      = v => v != null ? (v >= 0 ? '+' : '') + v.toFixed(2) + '%' : '—';
const pctClass = v => v == null ? 'flat' : v > 0 ? 'pos' : v < 0 ? 'neg' : 'flat';
const fmt      = v => v != null ? '₹' + v.toLocaleString('en-IN') : '—';
const badgeHtml = s => { const m={WIN:'badge-win',LOSS:'badge-loss',OPEN:'badge-open',NEUTRAL:'badge-neutral'}; return `<span class="badge ${m[s]||'badge-neutral'}">${s}</span>`; };

// ── LOAD DATA
async function loadData() {
  const urls = [
    'https://elitebreakoutsystem-production.up.railway.app/data/performance_data.json',
    '../data/performance_data.json', './data/performance_data.json', 'performance_data.json',
  ];
  for (const url of urls) { try { const r=await fetch(url); if(r.ok) return r.json(); } catch {} }
  console.warn('Using demo data');
  return getDemoData();
}

function getDemoData() {
  const scanners=['EOD','INTRADAY','1H','REVERSAL'], cats=['Elite Compounder','High Growth','Steady Compounder','Mature Quality','Turnaround'];
  const syms=['RELIANCE','INFY','HDFCBANK','TCS','ICICIBANK','TATAMOTORS','WIPRO','ADANIENT','LT','SBIN'];
  const rng=(lo,hi)=>lo+Math.random()*(hi-lo); const today=new Date(); const trades=[];
  for(let i=0;i<80;i++){
    const d=new Date(today); d.setDate(d.getDate()-Math.floor(rng(1,90)));
    const entry=Math.round(rng(100,3000)*100)/100, pnl=Math.round(rng(-18,30)*100)/100;
    const cur=Math.round(entry*(1+pnl/100)*100)/100, days=Math.floor(rng(1,90));
    const st=days<=1?'OPEN':pnl>=2?'WIN':pnl<=-2?'LOSS':'NEUTRAL';
    trades.push({symbol:syms[i%10],scanner:scanners[i%4],category:cats[i%5],signals:'52W Breakout, Weekly Breakout',
      entry_date:d.toISOString().slice(0,10),entry_price:entry,current_price:cur,
      stop_loss:Math.round(entry*.97*100)/100,target_price:Math.round(entry*1.08*100)/100,
      exit_price:st==='OPEN'?null:(st==='WIN'?Math.round(entry*1.08*100)/100:Math.round(entry*.97*100)/100),
      pnl_pct:pnl,status:st,days_held:days,score:Math.floor(rng(50,95)),rsi:Math.round(rng(30,75)*10)/10,volume_ratio:Math.round(rng(0.8,3.5)*100)/100});
  }
  const judged=trades.filter(t=>['WIN','LOSS','NEUTRAL'].includes(t.status));
  const wins=judged.filter(t=>t.status==='WIN'), losses=judged.filter(t=>t.status==='LOSS');
  const pnls=judged.map(t=>t.pnl_pct);
  const avg=pnls.reduce((a,b)=>a+b,0)/pnls.length;
  const avgW=wins.map(t=>t.pnl_pct).reduce((a,b)=>a+b,0)/(wins.length||1);
  const avgL=losses.map(t=>t.pnl_pct).reduce((a,b)=>a+b,0)/(losses.length||1);
  const wr=wins.length/judged.length*100;
  const mmap={};judged.forEach(t=>{const m=t.entry_date.slice(0,7);if(!mmap[m])mmap[m]={a:0,w:0,p:[]};mmap[m].a++;if(t.status==='WIN')mmap[m].w++;mmap[m].p.push(t.pnl_pct);});
  const monthly=Object.entries(mmap).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>({month:k,alerts:v.a,wins:v.w,win_rate:+(v.w/v.a*100).toFixed(1),avg_return:+(v.p.reduce((a,b)=>a+b,0)/v.p.length).toFixed(2)}));
  let cum=0;const ec=judged.sort((a,b)=>a.entry_date.localeCompare(b.entry_date)).map((t,i)=>{cum+=t.pnl_pct;return{date:t.entry_date,symbol:t.symbol,cumulative_return:+(cum/(i+1)).toFixed(2),trade_return:t.pnl_pct};});
  const bySc={};scanners.forEach(s=>{const st=judged.filter(t=>t.scanner===s),sw=st.filter(t=>t.status==='WIN'),ps=st.map(t=>t.pnl_pct);bySc[s]={total:trades.filter(t=>t.scanner===s).length,judged:st.length,win_rate:st.length?+(sw.length/st.length*100).toFixed(1):0,avg_return:ps.length?+(ps.reduce((a,b)=>a+b,0)/ps.length).toFixed(2):0};});
  const byCat={};cats.forEach(c=>{const ct=judged.filter(t=>t.category===c),cw=ct.filter(t=>t.status==='WIN'),pc=ct.map(t=>t.pnl_pct);byCat[c]={total:trades.filter(t=>t.category===c).length,judged:ct.length,win_rate:ct.length?+(cw.length/ct.length*100).toFixed(1):0,avg_return:pc.length?+(pc.reduce((a,b)=>a+b,0)/pc.length).toFixed(2):0};});
  return {generated_at:new Date().toISOString(),summary:{total_alerts:trades.length,judged:judged.length,winners:wins.length,losers:losses.length,open_positions:trades.filter(t=>t.status==='OPEN').length,win_rate:+wr.toFixed(1),avg_return_pct:+avg.toFixed(2),avg_win_pct:+avgW.toFixed(2),avg_loss_pct:+avgL.toFixed(2),best_trade_pct:+Math.max(...pnls).toFixed(2),worst_trade_pct:+Math.min(...pnls).toFixed(2),expectancy:+(wr/100*avgW+(1-wr/100)*avgL).toFixed(2),sl_triggered:losses.length,target_hit:wins.length},
    by_scanner:bySc,by_category:byCat,trades:trades.sort((a,b)=>b.entry_date.localeCompare(a.entry_date)),equity_curve:ec,monthly};
}

// ── KPIs + DRILL
let ALL_TRADES=[], activeKpi=null;

function renderKPIs(s) {
  const defs = [
    {id:'total',    label:'Total alerts',  value:s.total_alerts,      cls:'',      sub:'all time',              filter:t=>true},
    {id:'judged',   label:'Judged',        value:s.judged,            cls:'',      sub:`${s.sl_triggered||0} SL · ${s.target_hit||0} target`, filter:t=>['WIN','LOSS','NEUTRAL'].includes(t.status)},
    {id:'winrate',  label:'Win rate',      value:s.win_rate+'%',      cls:s.win_rate>=55?'green':s.win_rate>=45?'amber':'red', sub:`${s.winners}W / ${s.losers}L`, filter:t=>t.status==='WIN'||t.status==='LOSS'},
    {id:'avgret',   label:'Avg return',    value:pct(s.avg_return_pct), cls:s.avg_return_pct>=0?'green':'red', sub:'per judged trade', filter:t=>['WIN','LOSS','NEUTRAL'].includes(t.status)&&t.pnl_pct!=null},
    {id:'avgwin',   label:'Avg win',       value:pct(s.avg_win_pct),  cls:'green', sub:'winners only',          filter:t=>t.status==='WIN'},
    {id:'avgloss',  label:'Avg loss',      value:pct(s.avg_loss_pct), cls:'red',   sub:'losers only',           filter:t=>t.status==='LOSS'},
    {id:'expect',   label:'Expectancy',    value:pct(s.expectancy),   cls:s.expectancy>=0?'green':'red', sub:'WR×avgW+(1-WR)×avgL', filter:t=>['WIN','LOSS','NEUTRAL'].includes(t.status)},
    {id:'best',     label:'Best trade',    value:pct(s.best_trade_pct), cls:'green', sub:'',              filter:t=>t.pnl_pct!=null&&t.pnl_pct===s.best_trade_pct},
    {id:'worst',    label:'Worst trade',   value:pct(s.worst_trade_pct),cls:'red',  sub:'',              filter:t=>t.pnl_pct!=null&&t.pnl_pct===s.worst_trade_pct},
    {id:'open',     label:'Open',          value:s.open_positions,    cls:'blue',  sub:'awaiting close',        filter:t=>t.status==='OPEN'},
  ];
  document.getElementById('kpis').innerHTML = defs.map(d=>`
    <div class="kpi" data-id="${d.id}" onclick="drillKpi('${d.id}',this)">
      <div class="kpi-label">${d.label}</div>
      <div class="kpi-value ${d.cls}">${d.value}</div>
      ${d.sub?`<div class="kpi-sub">${d.sub}</div>`:''}
      <div class="kpi-hint">↓ showing trades</div>
      <div class="kpi-arrow"></div>
    </div>`).join('');
  window._kpiDefs = defs;
}

function drillKpi(id, el) {
  const panel = document.getElementById('drill-panel');
  if (activeKpi === id) { closeDrill(); return; }

  // deactivate previous
  document.querySelectorAll('.kpi').forEach(k=>k.classList.remove('active'));
  el.classList.add('active');
  activeKpi = id;

  const def = window._kpiDefs.find(d=>d.id===id);
  const trades = ALL_TRADES.filter(def.filter);
  document.getElementById('drill-title').textContent = `${def.label} — ${trades.length} trade${trades.length!==1?'s':''}`;
  document.getElementById('drill-body').innerHTML = renderMiniTable(trades);
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDrill() {
  document.getElementById('drill-panel').classList.remove('open');
  document.querySelectorAll('.kpi').forEach(k=>k.classList.remove('active'));
  activeKpi = null;
}

let expandedIds = new Set();

function toggleDetail(id) {
  const mainRow   = document.getElementById('mr-' + id);
  const panel     = document.getElementById('dp-' + id);
  if (!panel) return;
  if (expandedIds.has(id)) {
    expandedIds.delete(id);
    panel.classList.replace('open','closed');
    mainRow && mainRow.classList.remove('open');
  } else {
    expandedIds.add(id);
    panel.classList.replace('closed','open');
    mainRow && mainRow.classList.add('open');
  }
}

function buildTradeRows(trades, maxAbs, prefix) {
  return trades.map((t, i) => {
    const id = prefix + i;
    const barW = t.pnl_pct!=null ? Math.min(100,Math.abs(t.pnl_pct)/maxAbs*100).toFixed(1) : 0;
    const barColor = t.pnl_pct==null ? C.muted : t.pnl_pct>=0 ? C.accent : C.warn;
    const isOpen = expandedIds.has(id);
    return `
    <tr class="main-row${isOpen?' open':''}" id="mr-${id}" onclick="toggleDetail('${id}')">
      <td>${isOpen?'▼':'▶'}</td>
      <td style="font-weight:700;color:var(--text)">${t.symbol}</td>
      <td style="color:var(--muted)">${t.entry_date}</td>
      <td><span class="badge badge-scanner">${t.scanner}</span></td>
      <td style="color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis">${t.category}</td>
      <td>${fmt(t.entry_price)}</td>
      <td>${fmt(t.current_price)}</td>
      <td><div class="pnl-wrap"><div class="pnl-bar-track"><div class="pnl-bar-fill" style="width:${barW}%;background:${barColor}"></div></div><span class="pnl-text ${pctClass(t.pnl_pct)}">${pct(t.pnl_pct)}</span></div></td>
      <td style="color:var(--muted)">${t.days_held}d</td>
      <td>${badgeHtml(t.status)}</td>
    </tr>
    <tr class="detail-row">
      <td colspan="10">
        <div class="detail-panel ${isOpen?'open':'closed'}" id="dp-${id}">
          <div class="detail-item"><div class="detail-label">Stop loss</div><div class="detail-val neg">${fmt(t.stop_loss)}</div></div>
          <div class="detail-item"><div class="detail-label">Target</div><div class="detail-val pos">${fmt(t.target_price)}</div></div>
          <div class="detail-item"><div class="detail-label">Exit price</div><div class="detail-val">${fmt(t.exit_price)}</div></div>
          <div class="detail-item"><div class="detail-label">RSI</div><div class="detail-val" style="color:var(--accent2)">${t.rsi??'—'}</div></div>
          <div class="detail-item"><div class="detail-label">Score</div><div class="detail-val" style="color:var(--amber)">${t.score??'—'}</div></div>
          <div class="detail-item"><div class="detail-label">Vol ratio</div><div class="detail-val">${t.volume_ratio??'—'}</div></div>
          ${t.signals?`<div class="detail-signals">Signals: ${t.signals}</div>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderMiniTable(trades) {
  if (!trades.length) return `<div style="padding:24px;text-align:center;color:var(--muted)">No trades in this group.</div>`;
  const maxAbs = Math.max(...trades.map(t=>Math.abs(t.pnl_pct||0)),1);
  return `<table>
    <thead><tr>
      <th style="width:20px"></th>
      <th>Symbol</th><th>Date</th><th>Scanner</th><th>Category</th>
      <th>Entry ₹</th><th>Current ₹</th><th>P&L %</th><th>Days</th><th>Status</th>
    </tr></thead>
    <tbody>${buildTradeRows(trades, maxAbs, 'drill-')}</tbody>
  </table>`;
}

// ── MAIN TRADE TABLE
let sortCol='pnl_pct', sortDir=-1;

function renderTradeTable() {
  const sc  = document.getElementById('filterScanner').value;
  const st  = document.getElementById('filterStatus').value;
  const cat = document.getElementById('filterCategory').value;
  const sym = document.getElementById('filterSymbol').value.trim().toUpperCase();
  let filtered = ALL_TRADES.filter(t=>
    (!sc||t.scanner===sc)&&(!st||t.status===st)&&(!cat||t.category===cat)&&(!sym||t.symbol.includes(sym)));
  filtered = [...filtered].sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(va==null)return 1; if(vb==null)return -1;
    return sortDir*(va>vb?1:va<vb?-1:0);
  });
  const maxAbs = Math.max(...ALL_TRADES.map(t=>Math.abs(t.pnl_pct||0)),1);
  document.getElementById('tradeCount').textContent = `${filtered.length} trade${filtered.length!==1?'s':''}`;
  const body = document.getElementById('tradeBody');
  if (!filtered.length) { body.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--muted)">No trades match this filter.</td></tr>`; return; }
  body.innerHTML = buildTradeRows(filtered, maxAbs, 'main-');
  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col===sortCol) th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
}

document.addEventListener('click', e=>{
  const th=e.target.closest('th[data-col]'); if(!th)return;
  const col=th.dataset.col;
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
  renderTradeTable();
});
['filterScanner','filterStatus','filterCategory','filterSymbol'].forEach(id=>{
  document.getElementById(id).addEventListener('input', renderTradeTable);
  document.getElementById(id).addEventListener('change', renderTradeTable);
});

function populateFilters(trades) {
  const scanners=[...new Set(trades.map(t=>t.scanner))].sort();
  const cats=[...new Set(trades.map(t=>t.category))].sort();
  const sEl=document.getElementById('filterScanner'), cEl=document.getElementById('filterCategory');
  scanners.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sEl.appendChild(o);});
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cEl.appendChild(o);});
}

// ── CHARTS
function renderEquity(data) {
  if(!data.length)return;
  new Chart(document.getElementById('equityChart').getContext('2d'),{
    type:'line',data:{labels:data.map(d=>d.date),datasets:[{label:'Avg return %',data:data.map(d=>d.cumulative_return),borderColor:C.accent,backgroundColor:'rgba(22,163,74,0.06)',fill:true,tension:0.3,pointRadius:0,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>pct(ctx.parsed.y)}}},scales:{x:{ticks:{maxTicksLimit:6},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{callback:v=>pct(v)},grid:{color:'rgba(0,0,0,.04)'}}}}
  });
}
function renderMonthly(data) {
  if(!data.length)return;
  new Chart(document.getElementById('monthlyChart').getContext('2d'),{
    type:'bar',data:{labels:data.map(d=>d.month),datasets:[{data:data.map(d=>d.win_rate),backgroundColor:data.map(d=>d.win_rate>=60?'rgba(22,163,74,.7)':d.win_rate>=50?'rgba(217,119,6,.7)':'rgba(220,38,38,.7)'),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}% win rate · ${data[ctx.dataIndex].alerts} alerts`}}},scales:{x:{grid:{display:false}},y:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.04)'}}}}
  });
}
function renderScannerStats(by_scanner) {
  const entries=Object.entries(by_scanner).sort((a,b)=>b[1].win_rate-a[1].win_rate);
  const maxWR=Math.max(...entries.map(([,v])=>v.win_rate),1);
  document.getElementById('scannerStats').innerHTML=entries.map(([name,v])=>`
    <div class="scanner-stat">
      <div class="scanner-name">${name}</div>
      <div class="scanner-bar-wrap"><div class="scanner-bar" style="width:${(v.win_rate/maxWR*100).toFixed(1)}%"></div></div>
      <div class="scanner-nums">${v.win_rate}% · ${v.judged}t</div>
    </div>`).join('');
}
function renderCategoryChart(by_category) {
  const entries=Object.entries(by_category).sort((a,b)=>b[1].win_rate-a[1].win_rate);
  const palette=['#16a34a','#2563eb','#d97706','#7c3aed','#db2777','#0891b2'];
  new Chart(document.getElementById('categoryChart').getContext('2d'),{
    type:'bar',data:{labels:entries.map(([k])=>k.replace(' Compounder','').replace(' Quality','')),datasets:[{data:entries.map(([,v])=>v.win_rate),backgroundColor:entries.map((_,i)=>palette[i%palette.length]+'33'),borderColor:entries.map((_,i)=>palette[i%palette.length]),borderWidth:1.5,borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x}% win rate`}}},scales:{x:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.04)'}},y:{grid:{display:false},ticks:{font:{size:10}}}}}
  });
}
function renderDistribution(trades) {
  const pnls=trades.map(t=>t.pnl_pct).filter(v=>v!=null);
  if(!pnls.length)return;
  const min=Math.floor(Math.min(...pnls)),max=Math.ceil(Math.max(...pnls)),step=2,buckets=[];
  for(let lo=min;lo<max;lo+=step){const hi=lo+step;buckets.push({label:`${lo}`,count:pnls.filter(p=>p>=lo&&p<hi).length,positive:lo>=0});}
  new Chart(document.getElementById('distChart').getContext('2d'),{
    type:'bar',data:{labels:buckets.map(b=>b.label),datasets:[{data:buckets.map(b=>b.count),backgroundColor:buckets.map(b=>b.positive?'rgba(22,163,74,.4)':'rgba(220,38,38,.4)'),borderColor:buckets.map(b=>b.positive?C.accent:C.warn),borderWidth:1,borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} trades`}}},scales:{x:{ticks:{maxTicksLimit:8},grid:{display:false}},y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.04)'}}}}
  });
}

// ── MAIN
(async()=>{
  const data = await loadData();
  document.getElementById('loading').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('gen-time').textContent='Generated: '+(data.generated_at?new Date(data.generated_at).toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}):'—');
  if(!data.trades||!data.trades.length){document.getElementById('kpis').innerHTML='<div style="padding:48px;text-align:center;color:var(--muted)">No alert history found.</div>';return;}
  const s=data.summary;
  document.getElementById('header-stats').textContent=`${s.win_rate}% WR · ${s.winners}W ${s.losers}L ${s.open_positions} open`;
  renderKPIs(s);
  ALL_TRADES=data.trades;
  populateFilters(data.trades);
  renderTradeTable();
  renderEquity(data.equity_curve||[]);
  renderMonthly(data.monthly||[]);
  renderScannerStats(data.by_scanner||{});
  renderCategoryChart(data.by_category||{});
  renderDistribution(data.trades);
})();
</script>
